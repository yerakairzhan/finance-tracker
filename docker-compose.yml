services:
  redis:
    image: redis:7-alpine
    container_name: finance-tracker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - financial-network

  postgres:
    image: postgres:15-alpine
    container_name: finance-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_tracker
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - financial-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-tracker-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/finance_tracker?sslmode=disable
      PORT: 8080
      JWT_SECRET: dev-jwt-secret-change-me
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8080:8080"
    networks:
      - financial-network

  frontend:
    image: node:20-alpine
    container_name: finance-tracker-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      api:
        condition: service_started
    environment:
      VITE_PROXY_TARGET: http://api:8080
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    networks:
      - financial-network
  
  adminer:
    image: adminer:latest
    container_name: finance-tracker-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_DB_DRIVER: postgres
      ADMINER_DEFAULT_DB_HOST: postgres
      ADMINER_DEFAULT_DB_PORT: 5432
      ADMINER_DEFAULT_DB_USER: postgres
      ADMINER_DEFAULT_DB_PASSWORD: postgres
    ports:
      - "8081:8080"
    networks:
      - financial-network


networks:
  financial-network:
    driver: bridge

volumes:
  postgres_data:
  frontend_node_modules:
